<!DOCTYPE html>
<html>
<head>
    <title>VoidJam // Active</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            color: white; font-family: monospace; pointer-events: none;
            text-transform: uppercase; letter-spacing: 4px; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="overlay">System: Jamming // Scale: Phrygian Dominant</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, audioCtx, masterGain, reverb;
        
        // --- PRO SCALE: G-Minor Phrygian (Dark, Epic, Hard to sound bad) ---
        const SCALE = [98.00, 103.83, 123.47, 130.81, 146.83, 155.56, 185.00, 196.00, 207.65, 246.94];
        
        let mouse = { x: 0, y: 0, active: false };
        let trail = [];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            
            // Compression to make it "Crunchy"
            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
            compressor.knee.setValueAtTime(40, audioCtx.currentTime);
            
            masterGain.connect(compressor);
            compressor.connect(audioCtx.destination);
        }

        function playSynth(freq, x) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            
            // Mix of Sawtooth and Sine for "Full" sound
            osc.type = (x % 2 === 0) ? 'sawtooth' : 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            g.gain.setValueAtTime(0.15, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
            
            // Bandpass filter to make it "Sweep"
            const filter = audioCtx.createBiquadFilter();
            filter.type = "bandpass";
            filter.frequency.value = Math.random() * 2000 + 500;

            osc.connect(filter);
            filter.connect(g);
            g.connect(masterGain);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // Dark trails
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Update & Draw Ribbon Trail
            if (mouse.active) {
                trail.push({x: mouse.x, y: mouse.y, age: 0});
            }
            if (trail.length > 50) trail.shift();

            ctx.beginPath();
            for(let i = 0; i < trail.length; i++) {
                let p = trail[i];
                p.age++;
                let hue = (i * 5) + 200;
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${i/trail.length})`;
                ctx.lineWidth = i * 0.8;
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;

            // Jam Logic: Play note when crossing hidden vertical sections
            const section = Math.floor((e.clientX / width) * SCALE.length);
            if (section !== mouse.lastSection) {
                const f = SCALE[section % SCALE.length];
                playSynth(f, section);
                mouse.lastSection = section;
            }
        });

        window.addEventListener('mousedown', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            else initAudio();
            
            // Click = Power Chord (Base note)
            playSynth(SCALE[0] / 2, 0); 
            playSynth(SCALE[2] / 2, 1);
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
