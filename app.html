<!DOCTYPE html>
<html>
<head>
    <title>AuraSynth | Play</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        canvas { display: block; cursor: none; }
        #hint {
            position: absolute; bottom: 20px; left: 20px;
            color: rgba(99, 102, 241, 0.5); font-family: monospace;
            letter-spacing: 3px; font-size: 10px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hint">MOUSE: STRUM THE VOID • CLICK: PULSE WAVE</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let audioCtx, masterGain;
        
        // PENTATONIC SCALE (Safe notes for easy jamming)
        const SCALE = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00];
        let particles = [];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.1;
            masterGain.connect(audioCtx.destination);
        }

        function playNote(freq) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0.15, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        class Particle {
            constructor(x, y, freq) {
                this.x = x; this.y = y;
                this.freq = freq;
                this.r = Math.random() * 20 + 5;
                this.life = 1;
                this.hue = (freq % 360) + 200;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r * (1-this.life + 1), 0, Math.PI*2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
                ctx.stroke();
                this.life -= 0.02;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            const section = Math.floor((e.clientX / window.innerWidth) * SCALE.length);
            if (section !== window.lastSection) {
                const freq = SCALE[section % SCALE.length];
                playNote(freq);
                particles.push(new Particle(e.clientX, e.clientY, freq));
                window.lastSection = section;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (audioCtx) audioCtx.resume();
            playNote(SCALE[0] / 2); // Deep bass pulse
            for(let i=0; i<15; i++) particles.push(new Particle(e.clientX, e.clientY, 100));
        });

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

        window.onresize();
        animate();
    </script>
</body>
</html>
