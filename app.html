            masterGain.gain.value = 0.5;

                ctx.shadowColor = this.color;

                ctx.fillStyle = this.color;

                    ctx.beginPath();
                    for(let i=0; i<8; i++) {

                        let angle = (i/8)*Math.PI*2;
                        ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
                    }
                    ctx.fill();

                        ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
                    }
                    ctx.fill();

                }
