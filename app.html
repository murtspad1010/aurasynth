<!DOCTYPE html>
<html>
<head>
    <title>Void Band | Celestial Stage</title>
    <style>
        body, html { margin: 0; padding: 0; background: #020205; overflow: hidden; color: white; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 100;
            transition: opacity 1s;
        }
        .instr {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            letter-spacing: 5px; font-size: 10px; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="letter-spacing: 10px; font-weight: 100;">CLICK TO WAKE THE BAND</h2>
    </div>
    <div class="instr">METEOR • PLANET • STAR • NEBULA</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let audioCtx, masterGain;
        let w, h;

        // --- AUDIO ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.4;
            masterGain.connect(audioCtx.destination);
            setInterval(() => { if(audioCtx.state === 'running') step(); }, 200);
            document.getElementById('overlay').style.opacity = '0';
        }

        // --- CHARACTER LOGIC ---
        class Musician {
            constructor(name, relX, color, type) {
                this.name = name;
                this.relX = relX; // Position as % of screen width
                this.color = color;
                this.type = type;
                this.active = false;
                this.y = 0; 
                this.x = 0;
                this.size = 60;
            }

            updateCoords(width, height) {
                this.x = width * this.relX;
                this.y = height * 0.5;
            }

            draw() {
                const hoverY = Math.sin(Date.now() * 0.003 + (this.relX * 10)) * 20;
                const drawY = this.y + hoverY;

                ctx.save();
                ctx.translate(this.x, drawY);

                // Aura Glow
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.active ? 120 : 60);
                grad.addColorStop(0, this.color);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.active ? 0.8 : 0.2;
                ctx.beginPath();
                ctx.arc(0, 0, this.active ? 150 : 80, 0, Math.PI * 2);
                ctx.fill();

                // Character Shape
                ctx.globalAlpha = 1;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;

                if (this.name === 'METEOR') {
                    ctx.beginPath();
                    for(let i=0; i<6; i++) {
                        let r = 40 + (this.active ? Math.random()*20 : 0);
                        let a = (i/6) * Math.PI * 2;
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    ctx.closePath(); ctx.fill();
                } 
                else if (this.name === 'PLANET') {
                    ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.ellipse(0, 0, 90, 15, Math.PI/4, 0, Math.PI*2); ctx.stroke();
                } 
                else if (this.name === 'STAR') {
                    ctx.beginPath();
                    for(let i=0; i<10; i++) {
                        let r = i % 2 === 0 ? 60 : 25;
                        let a = (i/10) * Math.PI * 2;
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    ctx.closePath(); ctx.fill();
                } 
                else { // NEBULA
                    ctx.beginPath();
                    for(let i=0; i<3; i++) {
                        ctx.arc(Math.sin(Date.now()*0.001 + i)*20, Math.cos(Date.now()*0.001 + i)*20, 40, 0, Math.PI*2);
                    }
                    ctx.fill();
                }

                // Label
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                ctx.font = "10px Monospace";
                ctx.textAlign = "center";
                ctx.fillText(this.name, 0, 100);
                if(this.active) ctx.fillText("• ACTIVE •", 0, 115);

                ctx.restore();
            }
        }

        const band = [
            new Musician('METEOR', 0.2, '#ff4444', 'drum'),
            new Musician('PLANET', 0.4, '#4444ff', 'bass'),
            new Musician('STAR', 0.6, '#ffff44', 'lead'),
            new Musician('NEBULA', 0.8, '#ff44ff', 'vocal')
        ];

        // --- AUDIO PLAYBACK ---
        function playSnd(type, frq = 440) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            
            if (type === 'drum') {
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                g.gain.setValueAtTime(0.6, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            } else if (type === 'bass') {
                osc.type = 'square'; osc.frequency.value = 55;
                const f = audioCtx.createBiquadFilter(); f.frequency.value = 200;
                osc.connect(f); f.connect(g);
                g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sine'; osc.frequency.value = frq;
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                osc.connect(g);
            }

            if (type !== 'bass') osc.connect(g);
            g.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        let beat = 0;
        function step() {
            beat = (beat + 1) % 8;
            if (band[0].active && beat % 2 === 0) playSnd('drum');
            if (band[1].active && (beat === 0 || beat === 3)) playSnd('bass');
            if (band[2].active && beat % 2 !== 0) playSnd('lead', 440 + (beat * 20));
            if (band[3].active && beat === 0) playSnd('vocal', 880);
        }

        // --- RENDER & EVENTS ---
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            band.forEach(m => m.updateCoords(w, h));
        }

        window.onclick = (e) => {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            band.forEach(m => {
                const dist = Math.hypot(m.x - e.clientX, m.y - e.clientY);
                if (dist < 100) m.active = !m.active;
            });
        }

        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, w, h);
            band.forEach(m => m.draw());
            requestAnimationFrame(draw);
        }

        window.onresize = resize;
        resize();
        draw();
    </script>
</body>
</html>
