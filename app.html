<!DOCTYPE html>
<html>
<head>
    <title>AuraSynth Pro | Interactive Flow</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; bottom: 30px; left: 30px; color: #00f2ff;
            letter-spacing: 2px; font-size: 12px; pointer-events: none;
            text-transform: uppercase; text-shadow: 0 0 10px #00f2ff;
        }
        .hint { color: rgba(255,255,255,0.3); font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>AuraSynth // Signal Active</div>
        <div class="hint">Cross the lines to pluck • Click to drop a gravity pulse</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let audioCtx, masterGain, delayNode;

        // 1. THE MUSICAL SCALE (C-Major Pentatonic) - This makes it impossible to play a "bad" note
        const SCALE = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.2;

            // Add a Echo (Delay) effect for that "Space" sound
            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.4;
            const feedback = audioCtx.createGain();
            feedback.gain.value = 0.4;

            delayNode.connect(feedback);
            feedback.connect(delayNode);
            
            masterGain.connect(audioCtx.destination);
            masterGain.connect(delayNode);
            delayNode.connect(audioCtx.destination);
        }

        function playNote(freq, volume = 0.1, duration = 1) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            g.gain.setValueAtTime(volume, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- VISUALS ---
        let particles = [];
        let pulses = [];
        let lastX = 0;

        class Pulse {
            constructor(x, y, freq) {
                this.x = x; this.y = y; this.freq = freq;
                this.r = 0; this.maxR = 150;
                this.timer = 0;
            }
            update() {
                this.r += 2;
                if (this.r > this.maxR) {
                    this.r = 0;
                    playNote(this.freq, 0.05, 0.5); // Loop the sound
                }
            }
            draw() {
                ctx.strokeStyle = `rgba(0, 242, 255, ${1 - this.r/this.maxR})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.stroke();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Motion blur
            ctx.fillRect(0, 0, width, height);

            // Draw "Laser Strings"
            const step = width / (SCALE.length);
            for(let i=1; i < SCALE.length; i++) {
                let x = i * step;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
                ctx.stroke();
            }

            pulses.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(animate);
        }

        // --- INTERACTION ---
        window.addEventListener('mousemove', (e) => {
            const step = width / SCALE.length;
            const currentStrip = Math.floor(e.clientX / step);
            const lastStrip = Math.floor(lastX / step);

            // Only play if we cross a "String"
            if (currentStrip !== lastStrip) {
                const freq = SCALE[currentStrip % SCALE.length];
                playNote(freq, 0.15, 1.5);
                
                // Visual spark
                for(let i=0; i<5; i++) {
                    // (Particle logic would go here, simplified for now)
                }
            }
            lastX = e.clientX;
        });

        window.addEventListener('mousedown', (e) => {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const step = width / SCALE.length;
            const freq = SCALE[Math.floor(e.clientX / step) % SCALE.length];
            
            // Add a repeating pulse
            if (pulses.length > 5) pulses.shift(); // Limit pulses
            pulses.push(new Pulse(e.clientX, e.clientY, freq));
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
