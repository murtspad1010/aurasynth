<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID BAND | The Awakening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #canvas-bg { position: absolute; inset: 0; }
        .ui { position: relative; z-index: 10; transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); }
        .zoom-out { transform: scale(8); opacity: 0; filter: blur(20px); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <canvas id="canvas-bg"></canvas>
    <div id="ui" class="ui text-center">
        <h1 class="text-white text-8xl font-black tracking-tighter mb-4 italic">VOID BAND</h1>
        <p class="text-indigo-400 tracking-[1em] uppercase text-xs mb-12">Universal Tour // Star Date 00.1</p>
        <button onclick="ignite()" class="border-2 border-white px-12 py-4 text-white hover:bg-white hover:text-black transition-all font-bold tracking-widest">
            IGNITE THE STAGE
        </button>
    </div>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let stars = [], speed = 0.5, w, h;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<400; i++) stars.push({x: Math.random()*w, y: Math.random()*h, z: Math.random()*w});
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,w,h);
            stars.forEach(s => {
                s.z -= speed;
                if(s.z <= 0) s.z = w;
                let sx = (s.x - w/2) * (w/s.z) + w/2;
                let sy = (s.y - h/2) * (w/s.z) + h/2;
                let r = (w/s.z) * 1.5;
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        function ignite() {
            speed = 50;
            document.getElementById('ui').classList.add('zoom-out');
            setTimeout(() => { window.location.href = 'app.html'; }, 1300);
        }

        window.onresize = init; init(); draw();
    </script>
</body>
</html>
