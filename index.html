<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID BAND | Project X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        .void-portal {
            width: 2px; height: 2px; background: white; border-radius: 50%;
            box-shadow: 0 0 50px 20px white; transition: all 1.5s cubic-bezier(0.9, 0, 0.1, 1);
        }
        .zoom-active .void-portal { transform: scale(3000); filter: blur(5px); }
        .zoom-active .ui-fade { opacity: 0; transform: translateY(-20px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">
    <div id="wrapper" class="text-center ui-fade transition-all duration-1000">
        <h1 class="text-white text-9xl font-black tracking-tighter italic opacity-20">VOID</h1>
        <h2 class="text-indigo-500 text-xl tracking-[1em] mb-12">CELESTIAL BAND</h2>
        <button onclick="ignite()" class="border border-white/30 text-white px-12 py-4 rounded-full hover:bg-white hover:text-black transition-all">
            IGNITE THE VOID
        </button>
    </div>
    
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
        <div id="portal" class="void-portal"></div>
    </div>

    <script>
        function ignite() {
            document.body.classList.add('zoom-active');
            setTimeout(() => { window.location.href = 'app.html'; }, 1300);
        }
    </script>
</body>
</html>
