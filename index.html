<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraSynth | The Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow: hidden; margin: 0; font-family: 'Inter', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-box { position: relative; z-index: 10; transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1); }
        .zoom-out { transform: scale(5); opacity: 0; filter: blur(20px); }
        .glow-text { text-shadow: 0 0 20px rgba(99, 102, 241, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <canvas id="starfield"></canvas>
    
    <div id="content" class="ui-box text-center space-y-6">
        <h1 class="text-7xl font-thin tracking-[0.2em] text-white glow-text">AURASYNTH</h1>
        <p class="text-indigo-300 tracking-widest text-xs uppercase opacity-60">A Generative Sound Sanctuary</p>
        <div class="pt-8">
            <button onclick="startJourney()" class="px-10 py-3 border border-indigo-500/50 text-indigo-200 hover:bg-indigo-500 hover:text-white transition-all duration-500 rounded-full text-sm tracking-widest uppercase">
                Enter the Void
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [], speed = 0.5, zooming = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = (Math.random() - 0.5) * canvas.width;
                this.y = (Math.random() - 0.5) * canvas.height;
                this.z = Math.random() * canvas.width;
            }
            update() {
                this.z -= speed;
                if (this.z <= 0) {
                    this.z = canvas.width;
                    this.x = (Math.random() - 0.5) * canvas.width;
                    this.y = (Math.random() - 0.5) * canvas.height;
                }
            }
            draw() {
                let sx = (this.x / this.z) * (canvas.width / 2) + canvas.width / 2;
                let sy = (this.y / this.z) * (canvas.width / 2) + canvas.height / 2;
                let r = (1 - this.z / canvas.width) * 3;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<600; i++) stars.push(new Star());

        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        function startJourney() {
            if (zooming) return;
            zooming = true;
            speed = 40; // Hyperdrive
            document.getElementById('content').classList.add('zoom-out');
            setTimeout(() => { window.location.href = 'app.html'; }, 1200);
        }

        window.onresize = resize;
        resize(); animate();
    </script>
</body>
</html>
