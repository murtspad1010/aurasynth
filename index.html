<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraSynth | The Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow: hidden; margin: 0; }
        #canvas-bg { position: absolute; top: 0; left: 0; z-index: 0; }
        .content { position: relative; z-index: 10; transition: transform 2s ease-in, opacity 1.5s ease-out; }
        .void-active { transform: scale(10); opacity: 0; pointer-events: none; }
        
        /* The "Portal" Effect */
        .portal {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            filter: blur(40px);
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.5); opacity: 0.8; } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <canvas id="canvas-bg"></canvas>

    <div id="hero" class="content text-center">
        <div class="portal mx-auto mb-[-150px]"></div>
        <h1 class="text-8xl font-black text-white tracking-tighter mb-4">VOID</h1>
        <p class="text-indigo-400 tracking-[0.5em] uppercase text-sm mb-12">Universal Frequency Jammer</p>
        <button onclick="enterVoid()" class="group relative px-12 py-4 bg-transparent border-2 border-white text-white font-bold uppercase tracking-widest overflow-hidden transition-all hover:bg-white hover:text-black">
            <span class="relative z-10">Enter the Void</span>
        </button>
    </div>

    <script>
        // Starfield Background
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * canvas.width;
            }
            update(speed) {
                this.z -= speed;
                if (this.z <= 0) {
                    this.z = canvas.width;
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                }
            }
            draw() {
                let sx = (this.x - canvas.width/2) * (canvas.width/this.z) + canvas.width/2;
                let sy = (this.y - canvas.height/2) * (canvas.width/this.z) + canvas.height/2;
                let r = (canvas.width/this.z) * 1.5;
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI*2);
                ctx.fill();
            }
        }

        for(let i=0; i<400; i++) stars.push(new Star());

        let speed = 0.5;
        function animate() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.update(speed); s.draw(); });
            requestAnimationFrame(animate);
        }

        function enterVoid() {
            speed = 50; // Accelerate stars
            document.getElementById('hero').classList.add('void-active');
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 1500);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
